name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-3ds:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITARM=$DEVKITARM"
          which cmake || echo "no cmake on PATH"
          cmake --version || true

      - name: install 3ds portlibs
        run: |
          # devkitpro images expose pacman as either `dkp-pacman` or `pacman`
          PM=dkp-pacman; command -v $PM >/dev/null || PM=pacman
          PKGS="3ds-zlib 3ds-curl 3ds-mbedtls 3ds-jansson 3ds-libzstd"

          # devkitpro's pkg/downloads hosts intermittently return HTTP 403 for
          # some shared CI IPs (see devkitPro/pacman#63). It's transient, so we
          # rotate the mirror host and retry with backoff until the db syncs.
          ML=/opt/devkitpro/pacman/etc/pacman.d/mirrorlist
          [ -f "$ML" ] || ML=/etc/pacman.d/mirrorlist
          echo "mirrorlist: $ML"; cat "$ML" || true

          sync_ok=0
          for attempt in 1 2 3 4 5 6; do
            # alternate the host each attempt: pkg <-> downloads
            if [ $((attempt % 2)) -eq 0 ]; then
              sed -i 's#pkg.devkitpro.org#downloads.devkitpro.org#g' "$ML" || true
            else
              sed -i 's#downloads.devkitpro.org#pkg.devkitpro.org#g' "$ML" || true
            fi
            echo "::group::sync attempt $attempt"
            if $PM -Sy --noconfirm; then sync_ok=1; echo "::endgroup::"; break; fi
            echo "::endgroup::"
            sleep $((attempt * 15))
          done
          if [ "$sync_ok" != 1 ]; then
            echo "::error::devkitpro pacman db sync failed (HTTP 403 / mirror down). transient — re-run the job."
            exit 1
          fi

          # install with a couple of retries too (cdn hiccups)
          for attempt in 1 2 3; do
            $PM -S --noconfirm --needed $PKGS && break
            sleep $((attempt * 15))
          done

      - name: configure
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$DEVKITPRO/cmake/3DS.cmake" \
            -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build -j$(nproc)

      - name: upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: porthaul-3dsx
          path: build/porthaul.3dsx

  release:
    needs: build-3ds
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: porthaul-3dsx
          path: dist
      - name: list downloaded files
        run: ls -lR dist
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/porthaul.3dsx
          fail_on_unmatched_files: true
